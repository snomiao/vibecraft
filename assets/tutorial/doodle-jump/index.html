<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Jump</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      h1 {
        color: #4ade80;
        font-size: 2.5rem;
        text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
      }

      .game-wrapper {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(74, 222, 128, 0.3);
      }

      #gameCanvas {
        display: block;
        background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
      }

      .score-display {
        position: absolute;
        top: 15px;
        left: 15px;
        font-size: 1.5rem;
        font-weight: bold;
        color: #1a1a2e;
        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
      }

      .high-score {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 1rem;
        color: #1a1a2e;
        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
      }

      #startScreen,
      #gameOverScreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(26, 26, 46, 0.9);
        color: white;
        gap: 20px;
      }

      #gameOverScreen {
        display: none;
      }

      .screen-title {
        font-size: 2rem;
        color: #4ade80;
      }

      .final-score {
        font-size: 1.5rem;
      }

      .start-btn {
        padding: 15px 40px;
        font-size: 1.2rem;
        background: #4ade80;
        color: #1a1a2e;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .start-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
      }

      .instructions {
        color: #aaa;
        font-size: 0.9rem;
        text-align: center;
      }

      .controls {
        display: flex;
        gap: 30px;
        margin-top: 10px;
      }

      .control-key {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }

      .key {
        background: #333;
        padding: 10px 15px;
        border-radius: 6px;
        font-size: 0.8rem;
        border: 1px solid #555;
      }
    </style>
  </head>
  <body>
    <div class="game-container">
      <h1>🐸 Doodle Jump</h1>
      <div class="game-wrapper">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="score-display">Score: <span id="score">0</span></div>
        <div class="high-score">Best: <span id="highScore">0</span></div>

        <div id="startScreen">
          <div class="screen-title">🎮 Doodle Jump</div>
          <button class="start-btn" id="startBtn">Start Game</button>
          <div class="instructions">
            <p>Jump from platform to platform!</p>
            <p>Don't fall off the bottom!</p>
            <div class="controls">
              <div class="control-key">
                <span class="key">← →</span>
                <span>Move</span>
              </div>
              <div class="control-key">
                <span class="key">A D</span>
                <span>Move</span>
              </div>
            </div>
          </div>
        </div>

        <div id="gameOverScreen">
          <div class="screen-title">Game Over!</div>
          <div class="final-score">Score: <span id="finalScore">0</span></div>
          <button class="start-btn" id="restartBtn">Play Again</button>
        </div>
      </div>
    </div>

    <script>
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const scoreDisplay = document.getElementById('score');
      const highScoreDisplay = document.getElementById('highScore');
      const finalScoreDisplay = document.getElementById('finalScore');
      const startScreen = document.getElementById('startScreen');
      const gameOverScreen = document.getElementById('gameOverScreen');
      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');

      const CANVAS_WIDTH = canvas.width;
      const CANVAS_HEIGHT = canvas.height;

      let gameRunning = false;
      let score = 0;
      let highScore = localStorage.getItem('doodleJumpHighScore') || 0;
      highScoreDisplay.textContent = highScore;

      const player = {
        x: CANVAS_WIDTH / 2 - 20,
        y: CANVAS_HEIGHT - 150,
        width: 40,
        height: 50,
        velocityX: 0,
        velocityY: 0,
        speed: 6,
        jumpForce: -15,
        gravity: 0.5,
        facingRight: true,
      };

      let platforms = [];
      const PLATFORM_WIDTH = 70;
      const PLATFORM_HEIGHT = 15;
      const PLATFORM_COUNT = 8;

      const keys = {
        left: false,
        right: false,
      };

      function createPlatform(x, y, type = 'normal') {
        return {
          x,
          y,
          width: PLATFORM_WIDTH,
          height: PLATFORM_HEIGHT,
          type,
          broken: false,
          moveDirection: type === 'moving' ? (Math.random() > 0.5 ? 1 : -1) : 0,
          moveSpeed: 2,
        };
      }

      function initPlatforms() {
        platforms = [];
        const gap = CANVAS_HEIGHT / PLATFORM_COUNT;

        for (let i = 0; i < PLATFORM_COUNT; i++) {
          const x = Math.random() * (CANVAS_WIDTH - PLATFORM_WIDTH);
          const y = CANVAS_HEIGHT - i * gap - 50;

          let type = 'normal';
          if (i > 2 && Math.random() < 0.15) {
            type = 'breaking';
          } else if (i > 3 && Math.random() < 0.2) {
            type = 'moving';
          }

          platforms.push(createPlatform(x, y, type));
        }

        platforms[0].x = player.x - PLATFORM_WIDTH / 2 + player.width / 2;
        platforms[0].type = 'normal';
      }

      function resetGame() {
        player.x = CANVAS_WIDTH / 2 - 20;
        player.y = CANVAS_HEIGHT - 150;
        player.velocityX = 0;
        player.velocityY = 0;
        player.facingRight = true;
        score = 0;
        scoreDisplay.textContent = score;
        initPlatforms();
      }

      function drawPlayer() {
        ctx.save();

        const centerX = player.x + player.width / 2;
        const centerY = player.y + player.height / 2;

        if (!player.facingRight) {
          ctx.translate(centerX, centerY);
          ctx.scale(-1, 1);
          ctx.translate(-centerX, -centerY);
        }

        ctx.fillStyle = '#4ade80';
        ctx.beginPath();
        ctx.ellipse(
          player.x + player.width / 2,
          player.y + player.height / 2,
          player.width / 2,
          player.height / 2,
          0,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.fillStyle = '#22c55e';
        ctx.beginPath();
        ctx.ellipse(
          player.x + player.width / 2,
          player.y + player.height / 2 + 5,
          player.width / 2.5,
          player.height / 3,
          0,
          0,
          Math.PI * 2
        );
        ctx.fill();

        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.ellipse(player.x + 12, player.y + 15, 8, 10, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(player.x + 28, player.y + 15, 8, 10, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(player.x + 14, player.y + 15, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(player.x + 30, player.y + 15, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#16a34a';
        ctx.beginPath();
        ctx.ellipse(player.x - 5, player.y + player.height - 10, 8, 5, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(player.x + player.width + 5, player.y + player.height - 10, 8, 5, 0.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawPlatform(platform) {
        if (platform.broken) return;

        ctx.save();

        if (platform.type === 'normal') {
          ctx.fillStyle = '#8B4513';
          ctx.strokeStyle = '#5D2E0C';
        } else if (platform.type === 'breaking') {
          ctx.fillStyle = '#CD853F';
          ctx.strokeStyle = '#A0522D';
        } else if (platform.type === 'moving') {
          ctx.fillStyle = '#4169E1';
          ctx.strokeStyle = '#2E4A9E';
        }

        ctx.beginPath();
        ctx.roundRect(platform.x, platform.y, platform.width, platform.height, 5);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.roundRect(platform.x + 5, platform.y + 3, platform.width - 10, 4, 2);
        ctx.fill();

        if (platform.type === 'breaking') {
          ctx.strokeStyle = '#8B4513';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(platform.x + 20, platform.y + 2);
          ctx.lineTo(platform.x + 25, platform.y + platform.height - 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(platform.x + 45, platform.y + 3);
          ctx.lineTo(platform.x + 50, platform.y + platform.height - 3);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
        gradient.addColorStop(0, '#87CEEB');
        gradient.addColorStop(1, '#E0F6FF');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        drawCloud(50, 100, 40);
        drawCloud(300, 200, 30);
        drawCloud(150, 400, 35);
        drawCloud(320, 500, 25);
      }

      function drawCloud(x, y, size) {
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.arc(x + size, y - size / 3, size * 0.7, 0, Math.PI * 2);
        ctx.arc(x + size * 1.5, y, size * 0.8, 0, Math.PI * 2);
        ctx.fill();
      }

      function update() {
        if (!gameRunning) return;

        if (keys.left) {
          player.velocityX = -player.speed;
          player.facingRight = false;
        } else if (keys.right) {
          player.velocityX = player.speed;
          player.facingRight = true;
        } else {
          player.velocityX *= 0.8;
        }

        player.velocityY += player.gravity;
        player.x += player.velocityX;
        player.y += player.velocityY;

        if (player.x + player.width < 0) {
          player.x = CANVAS_WIDTH;
        } else if (player.x > CANVAS_WIDTH) {
          player.x = -player.width;
        }

        platforms.forEach((platform) => {
          if (platform.type === 'moving' && !platform.broken) {
            platform.x += platform.moveSpeed * platform.moveDirection;
            if (platform.x <= 0 || platform.x + platform.width >= CANVAS_WIDTH) {
              platform.moveDirection *= -1;
            }
          }
        });

        if (player.velocityY > 0) {
          platforms.forEach((platform) => {
            if (platform.broken) return;

            if (
              player.x + player.width > platform.x &&
              player.x < platform.x + platform.width &&
              player.y + player.height > platform.y &&
              player.y + player.height < platform.y + platform.height + player.velocityY
            ) {
              if (platform.type === 'breaking') {
                platform.broken = true;
              } else {
                player.velocityY = player.jumpForce;
                player.y = platform.y - player.height;
              }
            }
          });
        }

        if (player.y < CANVAS_HEIGHT / 3) {
          const offset = CANVAS_HEIGHT / 3 - player.y;
          player.y = CANVAS_HEIGHT / 3;

          platforms.forEach((platform) => {
            platform.y += offset;
          });

          score += Math.floor(offset);
          scoreDisplay.textContent = score;

          platforms = platforms.filter((platform) => platform.y < CANVAS_HEIGHT + 50);

          while (platforms.length < PLATFORM_COUNT) {
            const topPlatform = platforms.reduce((min, p) => (p.y < min.y ? p : min), platforms[0]);
            const gap = 60 + Math.random() * 40;
            const x = Math.random() * (CANVAS_WIDTH - PLATFORM_WIDTH);

            let type = 'normal';
            if (score > 1000 && Math.random() < 0.2) {
              type = 'breaking';
            } else if (score > 500 && Math.random() < 0.25) {
              type = 'moving';
            }

            platforms.push(createPlatform(x, topPlatform.y - gap, type));
          }
        }

        if (player.y > CANVAS_HEIGHT) {
          gameOver();
        }
      }

      function gameOver() {
        gameRunning = false;

        try {
          window.top?.postMessage({ type: 'tutorial:doodle-jump:game-over' }, '*');
        } catch {
          /* noop */
        }
        try {
          console.log('tutorial:doodle-jump:game-over');
        } catch {
          /* noop */
        }

        if (score > highScore) {
          highScore = score;
          localStorage.setItem('doodleJumpHighScore', highScore);
          highScoreDisplay.textContent = highScore;
        }

        finalScoreDisplay.textContent = score;
        gameOverScreen.style.display = 'flex';
      }

      function signalTutorialActivity() {
        try {
          console.log('tutorial:doodle-jump:activity');
        } catch {
          /* noop */
        }
      }

      function draw() {
        drawBackground();
        platforms.forEach(drawPlatform);
        drawPlayer();
      }

      function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
      }

      function startGame() {
        resetGame();
        gameRunning = true;
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
      }

      document.addEventListener('keydown', (e) => {
        signalTutorialActivity();
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
          keys.left = true;
        }
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
          keys.right = true;
        }
      });

      document.addEventListener('keyup', (e) => {
        signalTutorialActivity();
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
          keys.left = false;
        }
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
          keys.right = false;
        }
      });

      document.addEventListener('pointerdown', signalTutorialActivity);
      document.addEventListener('touchstart', signalTutorialActivity);

      startBtn.addEventListener('click', startGame);
      restartBtn.addEventListener('click', startGame);

      gameLoop();
    </script>
  </body>
</html>
