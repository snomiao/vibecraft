<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Simple terminal icon with prompt symbol -->
  <rect x="3" y="4" width="18" height="16" rx="2" fill="#14532D" stroke="#22C55E" stroke-width="1.2"/>
  <!-- Prompt symbol: > -->
  <path d="M7 9L11 12L7 15" stroke="#DCFCE7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor: _ -->
  <rect x="13" y="14" width="4" height="2" rx="0.5" fill="#DCFCE7"/>
</svg>
